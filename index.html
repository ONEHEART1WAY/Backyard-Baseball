<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiamondOS | Baseball Operations</title>
    
    <!-- EARLY INTERCEPTOR FOR OBS -->
    <!-- This runs before the page even exists, instantly making the background transparent -->
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('view') === 'overlay') {
            document.write('<style>html, body, .app-container { background: transparent !important; background-color: transparent !important; display: block !important; margin: 0; padding: 0; }</style>');
        }
    </script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="brand">
                <div class="brand-logo"></div>
                <h1>DiamondOS</h1>
            </div>
            <ul class="nav-links">
                <li><a href="#" data-route="dashboard" class="active">Dashboard</a></li>
                <li><a href="#" data-route="teams">Team Manager</a></li>
                <li><a href="#" data-route="players">Player Manager</a></li>
                <li><a href="#" data-route="games">Games & Scoring</a></li>
                <li><a href="#" data-route="settings">Settings</a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="topbar">
                <h2 id="view-title">Dashboard</h2>
                <div class="topbar-actions">
                    <span id="save-status" class="status-indicator">All changes saved</span>
                </div>
            </header>
            <div id="app-view" class="view-container">
                <!-- Views will be injected here by app.js -->
            </div>
        </main>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
